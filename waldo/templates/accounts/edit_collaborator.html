{% extends "base.html" %}  
  
{% block title %}Modifier un collaborateur{% endblock %}

{% block content %}
    <h2>Modifier le collaborateur : {{ collaborator.first_name }} {{ collaborator.last_name }}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Enregistrer les modifications</button>
    </form>

    <a href="{% url 'collaborator_list' %}">
        ⬅ Retour à la liste des collaborateurs
    </a>

{% endblock %}
