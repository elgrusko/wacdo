<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}<a href="{% url 'home' %}">Wacdo</a>{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --text: #1f2937;
            --muted: #64748b;
            --border: #dbe3ee;
            --brand: #0f766e;
            --brand-hover: #0b5f59;
            --brand-soft: #e6f6f4;
            --danger: #b91c1c;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 10px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 600px at 0% -10%, #dff7f2 0%, transparent 55%),
                radial-gradient(900px 500px at 110% 0%, #e8f1ff 0%, transparent 50%),
                var(--bg);
            line-height: 1.5;
        }

        .app-shell {
            width: min(1100px, 100% - 2rem);
            margin: 1.6rem auto 2rem;
        }

        header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.9rem;
            padding: 1rem 1.1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        header h1 {
            margin: 0;
            margin-right: auto;
            font-size: 1.5rem;
            line-height: 1.15;
            letter-spacing: 0.01em;
            color: #0f172a;
        }

        header p {
            margin: 0;
            color: var(--muted);
            font-size: 0.94rem;
        }

        header form {
            margin: 0;
        }

        header button {
            padding: 0.52rem 0.88rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s ease;
        }

        header button:hover {
            border-color: #9fb0c7;
            background: #edf2f8;
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border);
            margin: 1rem 0 0;
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 0.95rem;
            margin-top: 1rem;
        }

        main > * {
            margin: 0;
        }

        main > h1,
        main > h2 {
            font-size: clamp(1.4rem, 1.8vw, 1.9rem);
            line-height: 1.2;
            padding: 1rem 1.1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        main > h3 {
            font-size: 1.03rem;
            color: #334155;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
        }

        main > p,
        main > ul,
        main > form {
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--surface);
            box-shadow: var(--shadow);
            padding: 0.95rem 1.05rem;
        }

        main > ul {
            list-style: none;
            padding: 0;
            overflow: hidden;
        }

        main > ul > li {
            padding: 0.92rem 1.05rem;
            border-bottom: 1px solid #edf2f7;
        }

        main > ul > li:last-child {
            border-bottom: 0;
        }

        main > a {
            align-self: flex-start;
            text-decoration: none;
            font-weight: 700;
            color: var(--brand);
            border: 1px solid #b7ddd8;
            background: var(--brand-soft);
            border-radius: 999px;
            padding: 0.45rem 0.8rem;
            transition: all 0.18s ease;
        }

        main > a:hover {
            color: #0a4b46;
            border-color: #85c6be;
            background: #d6f1ec;
        }

        a {
            color: #0f5f9b;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }

        strong {
            color: #0f172a;
        }

        form p {
            margin: 0 0 0.8rem;
        }

        form p:last-child {
            margin-bottom: 0;
        }

        form label {
            display: block;
            font-weight: 700;
            color: #334155;
            margin-bottom: 0.25rem;
            font-size: 0.92rem;
        }

        form input[type="text"],
        form input[type="email"],
        form input[type="password"],
        form input[type="date"],
        form input[type="number"],
        form select,
        form textarea {
            width: 100%;
            border: 1px solid #c7d3e2;
            border-radius: var(--radius-sm);
            padding: 0.58rem 0.72rem;
            font-size: 0.95rem;
            color: var(--text);
            background: #fff;
            transition: border-color 0.16s ease, box-shadow 0.16s ease;
        }

        form input:focus,
        form select:focus,
        form textarea:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
        }

        form input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--brand);
            vertical-align: middle;
        }

        form button[type="submit"] {
            margin-top: 0.4rem;
            border: 0;
            border-radius: 999px;
            padding: 0.58rem 1rem;
            background: var(--brand);
            color: white;
            font-weight: 700;
            font-size: 0.92rem;
            cursor: pointer;
            transition: background 0.16s ease, transform 0.16s ease;
        }

        form button[type="submit"]:hover {
            background: var(--brand-hover);
            transform: translateY(-1px);
        }

        form button.btn-danger {
            background: #b91c1c;
        }

        form button.btn-danger:hover {
            background: #991b1b;
        }

        .errorlist {
            margin: 0 0 0.8rem;
            padding: 0.6rem 0.8rem;
            list-style: none;
            border-radius: var(--radius-md);
            border: 1px solid #fecaca;
            background: #fef2f2;
            color: var(--danger);
            font-size: 0.88rem;
        }

        .helptext {
            display: block;
            margin-top: 0.25rem;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .alert-error {
            border: 1px solid #fecaca;
            background: #fef2f2;
            color: var(--danger);
        }

        .actions-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem;
        }

        .actions-row form {
            margin: 0;
            border: 0;
            background: transparent;
            box-shadow: none;
            padding: 0;
        }

        @media (max-width: 780px) {
            .app-shell {
                width: min(1100px, 100% - 1rem);
                margin-top: 0.8rem;
            }

            header {
                padding: 0.9rem;
                gap: 0.7rem;
            }

            main > h1,
            main > h2,
            main > p,
            main > ul,
            main > form {
                padding-inline: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">

        <header>
            <h1>Wacdo</h1>

            {% if user.is_authenticated %}
                <p>
                    Connecté en tant que <strong>{{ user.username }}</strong>
                </p>
                 <form method="post" action="{% url 'home' %}">
                    {% csrf_token %}
                    <button type="submit">Tableau de bord</button>
                </form>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit">Se déconnecter</button>
                </form>
            {% endif %}
        </header>

        <hr>

        <main>
            {% block content %}
            {% endblock %}
        </main>

    </div>
</body>
</html>
