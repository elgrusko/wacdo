<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
</head>
<body>
    <h1>Connexion</h1>

    {% if form.errors %}
        <p style="color: red;">
            Identifiants invalides. Merci de réessayer.
        </p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Se connecter</button>
    </form>
</body>
</html>
