{% extends "base.html" %}

{% block title %}Connexion - Waldo{% endblock %}

{% block content %}
    <h1>Connexion</h1>

    {% if form.errors %}
        <p style="color: red;">
            Identifiants invalides. Merci de réessayer.
        </p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Se connecter</button>
    </form>
{% endblock %}
