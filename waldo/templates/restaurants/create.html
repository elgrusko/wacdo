{% extends "base.html" %}

{% block title %}Créer un restaurant{% endblock %}

{% block content %}
    <h2>Créer un restaurant</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Créer</button>
    </form>

    <p>
        <a href="{% url 'list_restaurants' %}">
            ⬅ Retour à la liste des restaurants
        </a>
    </p>
{% endblock %}
