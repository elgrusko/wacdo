{% extends "base.html" %}

{% block title %}Modifier {{ restaurant.name }}{% endblock %}

{% block content %}
    <h2>Modifier {{ restaurant.name }}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Enregistrer les modifications</button>
    </form>

    <p>
        <a href="{% url 'detail_restaurant' restaurant.id %}">
            ⬅ Retour à la fiche du restaurant
        </a>
    </p>
{% endblock %}
